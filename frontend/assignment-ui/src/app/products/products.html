<div class="container mt-5">
    <h2>Products</h2>
    <input class="form-control mb-2" placeholder="Name" [(ngModel)]="product.name">
    <input class="form-control mb-2" placeholder="Price" [(ngModel)]="product.price">
    <input class="form-control mb-2" placeholder="Quantity" [(ngModel)]="product.quantity">
    <button class="btn btn-success mb-3" (click)="save()">Save</button>
    
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of products">
            <td>{{ p.name }}</td>
            <td>{{ p.price }}</td>
            <td>{{ p.quantity }}</td>
            <td>
                <button class="btn btn-warning mb-2" (click)="edit(p)">
                  Edit
                </button>

                <button class="btn btn-danger" (click)="delete(p.id!)">
                  Delete
                </button>
            </td>
          </tr>
        </tbody>
    </table>

    <button class="btn btn-danger" (click)="logout()"> Logout </button>
</div>
