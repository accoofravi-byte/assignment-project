<div class="container mt-5">
    <h2>Login</h2>

    <input type="text" class="form-control mb-2" placeholder="Username" [(ngModel)]="model.username">
    
    <input type="password" class="form-control mb-2" placeholder="Password" [(ngModel)]="model.password">
    
    <button class="btn btn-primary" (click)="login()">Login</button>

    <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
    </div>
</div>
