name: Build and Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Create image tag (IMPORTANT FIX)
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 5. Build image
      - name: Build Docker image
        run: |
          docker build -t assignment-api:${{ env.IMAGE_TAG }} ./backend/AssignmentApi

      # 6. Tag image for ECR
      - name: Tag Docker image
        run: |
          docker tag assignment-api:${{ env.IMAGE_TAG }} \
          ${{ steps.login-ecr.outputs.registry }}/assignment-api:${{ env.IMAGE_TAG }}

      # 7. Push image
      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/assignment-api:${{ env.IMAGE_TAG }}

      # 8. Force ECS deployment
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster assignment-cluster \
            --service assignment-service \
            --force-new-deployment

      # 9. Wait for stability (IMPORTANT)
      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster assignment-cluster \
            --services assignment-service